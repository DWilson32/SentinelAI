# Render Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: sentinel-ai-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromDatabase:
          name: sentinel-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://frontend-rho-five-98.vercel.app

databases:
  - name: sentinel-db
    plan: free
    databaseName: sentinel
    user: sentinel
